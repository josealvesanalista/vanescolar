<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c3e50">
    <link rel="manifest" href="manifest.json">
    <title>TIA DAY - VAN PRO</title>
    <style>
        :root { --primary: #f39c12; --secondary: #2c3e50; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; --blue: #3498db; --whatsapp: #25d366; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: #333; overflow-x: hidden; }
        
        header { background: var(--secondary); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .menu-icon { font-size: 24px; cursor: pointer; padding: 5px; }
        .sidebar { position: fixed; left: -260px; top: 0; width: 250px; height: 100%; background: var(--secondary); color: white; transition: 0.3s; z-index: 2000; padding-top: 60px; box-shadow: 2px 0 10px rgba(0,0,0,0.3); }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 25px; color: #ecf0f1; text-decoration: none; border-bottom: 1px solid #34495e; font-size: 16px; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; }
        .overlay.active { display: block; }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        .view { display: none; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .home-hero { text-align: center; padding: 30px 20px; }
        .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .home-btn { background: white; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #ddd; font-weight: bold; color: var(--secondary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; }

        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: bold; color: #7f8c8d; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1px solid #dcdde1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }

        .item-aluno { display: flex; align-items: center; background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-left: 8px solid #ccc; }
        .info { flex: 1; cursor: pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; position: relative; max-height: 85vh; overflow-y: auto; }
        .btn-modal { display: block; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; text-align: center; text-decoration: none; border: none; font-size: 14px; box-sizing: border-box; cursor: pointer; }
    </style>
</head>
<body>

    <div class="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <a onclick="navegar('v-home')">🏠 Início</a>
        <a onclick="navegar('v-rota')">🚐 Ver Rota</a>
        <a onclick="navegar('v-aluno')">👤 Cadastrar Aluno</a>
        <a onclick="navegar('v-escola')">🏫 Escolas</a>
        <a onclick="navegar('v-fin')">💰 Financeiro</a>
    </div>

    <header>
        <span class="menu-icon" onclick="toggleMenu()">☰</span>
        <span>TIA DAY - VAN PRO</span>
        <div style="width: 24px;"></div>
    </header>

    <div class="container">
        <div id="v-home" class="view active">
            <div class="home-hero">
                <h1 style="margin:0; color:var(--primary)">🚐</h1>
                <h2>Olá, Tia Day!</h2>
            </div>
            <div class="home-grid">
                <div class="home-btn" onclick="navegar('v-rota')">🚐<br>ROTA</div>
                <div class="home-btn" onclick="navegar('v-aluno')">👤<br>CADASTRAR</div>
                <div class="home-btn" onclick="navegar('v-fin')">💰<br>CAIXA</div>
                <div class="home-btn" onclick="toggleMenu()">⚙️<br>MENU</div>
            </div>
        </div>

        <div id="v-rota" class="view">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button onclick="mudarTurno('Manhã')" style="flex:1; padding:12px; border-radius:10px; border:1px solid #ddd; background:white;">Manhã</button>
                <button onclick="mudarTurno('Tarde')" style="flex:1; padding:12px; border-radius:10px; border:1px solid #ddd; background:white;">Tarde</button>
            </div>
            <h3 id="label-turno">Ordem: Manhã</h3>
            <div id="lista-alunos-rota"></div>
        </div>

        <div id="v-aluno" class="view">
            <div class="card">
                <h3 id="titulo-cadastro">Novo Aluno</h3>
                <input type="hidden" id="edit-index" value="-1">
                <label>Nome</label><input type="text" id="cad-nome">
                <label>Responsável</label><input type="text" id="cad-resp">
                <label>WhatsApp</label><input type="tel" id="cad-tel" placeholder="83900000000">
                <div style="display:flex; gap:10px">
                    <div style="flex:1"><label>Valor R$</label><input type="number" id="cad-valor"></div>
                    <div style="flex:1"><label>Vencimento</label><input type="number" id="cad-dia"></div>
                </div>
                <label>Turno</label><select id="cad-turno"><option value="Manhã">Manhã</option><option value="Tarde">Tarde</option></select>
                <label>Escola</label><select id="cad-esc"></select>
                <label>Endereço</label><input type="text" id="cad-end">
                <button class="btn-main" onclick="salvarAluno()">SALVAR NO BANCO</button>
            </div>
        </div>

        <div id="v-escola" class="view">
            <div class="card">
                <label>Nome da Escola</label><input type="text" id="esc-nome">
                <button class="btn-main" onclick="salvarEscola()" style="background:var(--secondary)">SALVAR ESCOLA</button>
            </div>
            <div id="lista-escolas-cad"></div>
        </div>

        <div id="v-fin" class="view">
            <div class="card" style="background:var(--success); color:white; text-align:center">
                <small>Recebido no Mês</small><br><b id="display-saldo" style="font-size:28px">R$ 0,00</b>
            </div>
        </div>
    </div>

    <div id="meuModal" class="modal">
        <div class="modal-content">
            <h3 id="mod-nome"></h3>
            <div id="mod-dados" style="font-size:14px; margin-bottom:15px"></div>
            <a id="btn-rota-gps" href="#" target="_blank" class="btn-modal" style="background:var(--blue); color:white;">📍 ROTA NO MAPS</a>
            <a id="btn-zap" href="#" target="_blank" class="btn-modal" style="background:var(--whatsapp); color:white;">💬 WHATSAPP</a>
            <button class="btn-modal" style="background:#95a5a6; color:white;" onclick="prepararEdicao()">✏️ ALTERAR</button>
            <button id="mod-btn-pago" class="btn-modal" onclick="alternarPagamento()" style="color:white;"></button>
            <button onclick="deletarAluno()" style="background:none; border:none; color:red; width:100%; margin-top:15px">Excluir Aluno</button>
            <button onclick="fecharModal()" style="width:100%; border:none; margin-top:10px; cursor:pointer">Fechar</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // CONFIGURAÇÃO DO FIREBASE COM AS SUAS CHAVES
        const firebaseConfig = {
            apiKey: "AIzaSyDOmwescijjj2l0w0CDfEukTkBZl-x3bf8",
            authDomain: "vanescolar-4e5aa.firebaseapp.com",
            databaseURL: "https://vanescolar-4e5aa-default-rtdb.firebaseio.com",
            projectId: "vanescolar-4e5aa",
            storageBucket: "vanescolar-4e5aa.firebasestorage.app",
            messagingSenderId: "720140865808",
            appId: "1:720140865808:web:f3735b9b3b01703c831595",
            measurementId: "G-34V0S5N4KE"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let DB_ALUNOS = [];
        let DB_KEYS = [];
        let DB_ESCOLAS = [];
        let TURNO_FILTRO = 'Manhã';
        let INDEX_ABERTO = null;

        function carregarDados() {
            db.ref('alunos').on('value', snap => {
                const data = snap.val();
                DB_ALUNOS = data ? Object.values(data) : [];
                DB_KEYS = data ? Object.keys(data) : [];
                renderRota();
                renderFinanceiro();
            });
            db.ref('escolas').on('value', snap => {
                const data = snap.val();
                DB_ESCOLAS = data ? Object.values(data) : [];
                renderEscolas();
            });
        }

        function salvarAluno() {
            const idx = document.getElementById('edit-index').value;
            const al = {
                n: document.getElementById('cad-nome').value,
                r: document.getElementById('cad-resp').value,
                t: document.getElementById('cad-tel').value.replace(/\D/g,''),
                v: parseFloat(document.getElementById('cad-valor').value) || 0,
                d: document.getElementById('cad-dia').value,
                u: document.getElementById('cad-turno').value,
                s: document.getElementById('cad-esc').value,
                e: document.getElementById('cad-end').value,
                pago: (idx !== "-1") ? DB_ALUNOS[idx].pago : false
            };
            if(!al.n) return alert("Nome é obrigatório!");
            
            if(idx !== "-1") {
                db.ref('alunos/' + DB_KEYS[idx]).set(al);
            } else {
                db.ref('alunos').push(al);
            }
            limparForm();
            navegar('v-rota');
        }

        function renderRota() {
            const lista = document.getElementById('lista-alunos-rota');
            lista.innerHTML = '';
            DB_ALUNOS.forEach((al, idx) => {
                if(al.u === TURNO_FILTRO) {
                    const cor = al.pago ? 'var(--success)' : 'var(--danger)';
                    lista.innerHTML += `<div class="item-aluno" style="border-left-color:${cor}" onclick="abrirModal(${idx})">
                        <div class="info"><b>${al.n}</b><br><small>${al.s}</small></div>
                    </div>`;
                }
            });
        }

        function abrirModal(idx) {
            INDEX_ABERTO = idx;
            const al = DB_ALUNOS[idx];
            document.getElementById('mod-nome').innerText = al.n;
            document.getElementById('mod-dados').innerHTML = `Resp: ${al.r}<br>Vence: Dia ${al.d}<br>Valor: R$ ${al.v
